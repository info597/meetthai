name: meet_thai
description: Meet Thai Dating App
publish_to: 'none'

version: 1.0.50+52

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase / Push
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  firebase_remote_config: ^5.5.0

  # Backend
  supabase_flutter: ^2.5.6

  # Video
  video_player: ^2.9.2

  # File Upload
  file_picker: ^10.3.10

  # Image Compression
  flutter_image_compress: ^2.3.0

  # In-App Purchases
  purchases_flutter: ^9.12.2

  # UI
  badges: ^3.1.2
  url_launcher: ^6.3.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/profiles/
    - assets/images/meetthai_adaptive_foreground.png
    - assets/images/meetthai_splash_padded.png

flutter_native_splash:
  color: "#FCE4EC"
  image: assets/images/meetthai_splash_padded.png

  android_12:
    color: "#FCE4EC"
    image: assets/images/meetthai_splash_padded.png

  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: true
  ios: true

  image_path: assets/images/meetthai_adaptive_foreground.png

  adaptive_icon_background: "#FCE4EC"
  adaptive_icon_foreground: assets/images/meetthai_adaptive_foreground.png
