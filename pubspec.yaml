name: meet_thai
description: Meet Thai Dating App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase / Push
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4

  # Backend
  supabase_flutter: ^2.5.6

  # Video (für Chat Shorts)
  video_player: ^2.9.2

  # File Upload
  file_picker: ^10.3.10

  # Image Compression
  flutter_image_compress: ^2.3.0

  # In-App Purchases (RevenueCat)
  purchases_flutter: ^9.12.2

  # UI
  badges: ^3.1.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/profiles/